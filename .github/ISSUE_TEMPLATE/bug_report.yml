name: Bug Report
description: Report broken behavior.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps
      description: How to reproduce it.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What should happen?
  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: What happened instead?
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Browser, device, logs, screenshots.
